<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elva Wang — Learning Design, Strategy & Data</title>
<meta name="description" content="Elva Wang designs learning experiences, research-driven strategies, and data-informed products." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#FBFAF5; --surface:#FFFFFF; --ink:#221F29; --muted:#6E6878; --line:#ECE6DC;
  --shadow:0 1px 2px rgba(34,31,41,.04), 0 12px 30px -16px rgba(34,31,41,.18);
  --shadow-lift:0 2px 4px rgba(34,31,41,.05), 0 26px 50px -24px rgba(34,31,41,.30);
  /* brand (marigold) — used sparingly on neutral pages */
  --accent:#E0A23C; --accent-deep:#92651A; --soft:#FAEDCF;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:'Hanken Grotesk',system-ui,sans-serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --maxw:1140px;
}
/* discipline color system — the site's signature */
.cat-learning  { --accent:#1FA67C; --accent-deep:#0C5E47; --soft:#E3F4EC; }
.cat-marketing { --accent:#EB6E4B; --accent-deep:#A8401D; --soft:#FCE6DC; }
.cat-data      { --accent:#5A6AD4; --accent-deep:#333E9A; --soft:#E5E8FB; }

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:var(--canvas); color:var(--ink);
  font-family:var(--body); font-size:17px; line-height:1.6;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);font-weight:500}
h1,h2,h3{font-family:var(--display);font-weight:700;line-height:1.05;letter-spacing:-.02em;margin:0}
p{margin:0 0 1em}
:focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px}

/* ---------- NAV ---------- */
header.nav{position:sticky;top:0;z-index:50;backdrop-filter:saturate(1.2) blur(10px);
  background:color-mix(in srgb,var(--canvas) 86%,transparent);border-bottom:1px solid var(--line)}
.nav-in{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:1.12rem;letter-spacing:-.01em}
.brand .dots{display:inline-flex;gap:4px}
.brand .dots i{width:9px;height:9px;border-radius:50%;display:block}
.brand .dots i:nth-child(1){background:#1FA67C}.brand .dots i:nth-child(2){background:#EB6E4B}.brand .dots i:nth-child(3){background:#5A6AD4}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{font-size:.96rem;font-weight:500;color:var(--muted);padding:6px 2px;position:relative;transition:color .2s}
.nav-links a:hover{color:var(--ink)}
.nav-links a.active{color:var(--ink)}
.nav-links a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--accent);border-radius:2px}
.menu-btn{display:none;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:1.1rem;line-height:1}
@media(max-width:760px){
  .nav-links{position:absolute;top:100%;left:0;right:0;flex-direction:column;gap:0;background:var(--canvas);border-bottom:1px solid var(--line);padding:6px 24px 14px;display:none}
  .nav-links.open{display:flex}
  .nav-links a{padding:12px 0;border-bottom:1px solid var(--line);width:100%}
  .nav-links a.active::after{display:none}
  .menu-btn{display:block}
}

/* ---------- VIEW transitions ---------- */
.view{animation:fade .5s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.reveal{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.view,.reveal{animation:none!important;transition:none!important;opacity:1!important;transform:none!important}html{scroll-behavior:auto}}

/* ---------- HERO (home) ---------- */
.hero{padding:72px 0 40px;position:relative}
.hero::before{content:"";position:absolute;inset:0 -10% auto auto;width:520px;height:520px;top:-120px;
  background:radial-gradient(closest-side,rgba(224,162,60,.16),transparent 70%);z-index:-1;pointer-events:none}
.hero h1{font-size:clamp(2.5rem,6.2vw,5rem);font-weight:800;max-width:15ch}
.hero h1 .m{color:#1FA67C}.hero h1 .c{color:#EB6E4B}.hero h1 .d{color:#5A6AD4}
.hero .lede{font-size:clamp(1.05rem,1.6vw,1.25rem);color:var(--muted);max-width:60ch;margin-top:26px}
.hero-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.tagpill{font-family:var(--mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink);
  background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 14px}

/* ---------- SECTION scaffold ---------- */
.section{padding:56px 0}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:30px;flex-wrap:wrap}
.section-head h2{font-size:clamp(1.7rem,3.2vw,2.5rem);font-weight:700}
.section-head p{color:var(--muted);margin:6px 0 0;max-width:46ch}

/* ---------- CATEGORY TILES ---------- */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:860px){.tiles{grid-template-columns:1fr}}
.tile{background:var(--soft);border:1px solid color-mix(in srgb,var(--accent) 22%,var(--line));border-radius:22px;
  padding:30px 28px 26px;display:flex;flex-direction:column;min-height:230px;transition:transform .25s,box-shadow .25s}
.tile:hover{transform:translateY(-6px);box-shadow:var(--shadow-lift)}
.tile .num{font-family:var(--mono);font-size:.8rem;color:var(--accent-deep)}
.tile h3{font-size:1.5rem;margin:14px 0 8px;color:var(--ink)}
.tile p{color:color-mix(in srgb,var(--ink) 78%,var(--accent-deep));font-size:.98rem;margin:0}
.tile .go{margin-top:auto;padding-top:20px;font-family:var(--mono);font-size:.82rem;color:var(--accent-deep);display:flex;align-items:center;gap:8px}
.tile .go .arr{transition:transform .25s}.tile:hover .go .arr{transform:translateX(6px)}

/* ---------- PROJECT CARDS ---------- */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:960px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.cards{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:20px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;height:100%}
a.card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lift)}
.card .thumb{aspect-ratio:16/10;background:var(--soft);overflow:hidden;border-bottom:1px solid var(--line);position:relative}
.card .thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
a.card:hover .thumb img{transform:scale(1.04)}
.card .thumb.contain img{object-fit:contain;padding:14px;background:#fff}
.card-body{padding:22px 22px 24px;display:flex;flex-direction:column;flex:1}
.card .cat{font-family:var(--mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent-deep)}
.card h3{font-size:1.2rem;margin:10px 0 8px;line-height:1.15}
.card .desc{color:var(--muted);font-size:.95rem;margin:0 0 16px}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:auto}
.pill{font-family:var(--mono);font-size:.7rem;letter-spacing:.02em;color:var(--accent-deep);background:var(--soft);
  border:1px solid color-mix(in srgb,var(--accent) 26%,transparent);border-radius:999px;padding:5px 10px}
.card .view{margin-top:18px;font-family:var(--mono);font-size:.8rem;color:var(--accent-deep);display:flex;align-items:center;gap:8px}
.card .view .arr{transition:transform .25s}a.card:hover .view .arr{transform:translateX(6px)}
.badge{position:absolute;top:14px;left:14px;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;
  background:var(--ink);color:#fff;border-radius:999px;padding:6px 11px}
.card.soon{opacity:.96}
.card.soon .view{color:var(--muted)}

/* featured scroller */
.scroller{display:flex;gap:22px;overflow-x:auto;padding:4px 4px 22px;scroll-snap-type:x mandatory;margin:0 -4px}
.scroller .card{min-width:330px;max-width:330px;scroll-snap-align:start}
.scroller::-webkit-scrollbar{height:8px}.scroller::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

/* ---------- HOW I WORK ---------- */
.flow{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
@media(max-width:860px){.flow{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.flow{grid-template-columns:1fr}}
.step{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px 18px;position:relative}
.step .n{font-family:var(--mono);font-size:.78rem;color:var(--accent-deep);display:inline-block;border:1px solid var(--line);border-radius:999px;width:30px;height:30px;line-height:28px;text-align:center;margin-bottom:14px}
.step h4{font-family:var(--display);font-weight:700;font-size:1.1rem;margin:0 0 6px}
.step p{font-size:.9rem;color:var(--muted);margin:0}

/* ---------- CTA band ---------- */
.cta{background:var(--ink);color:#fff;border-radius:26px;padding:54px 44px;display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:wrap}
.cta h2{color:#fff;font-size:clamp(1.6rem,3vw,2.4rem);max-width:18ch}
.cta p{color:rgba(255,255,255,.7);margin:10px 0 0}
.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:.86rem;letter-spacing:.02em;
  background:var(--accent);color:#1b1b1b;border:none;border-radius:999px;padding:15px 26px;cursor:pointer;transition:transform .2s,filter .2s;font-weight:500}
.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}
.btn.solid-ink{background:var(--ink);color:#fff}

/* ---------- PROJECTS PAGE ---------- */
.filters{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 18px}
.chip{font-family:var(--mono);font-size:.8rem;letter-spacing:.02em;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:9px 16px;cursor:pointer;color:var(--muted);transition:all .2s}
.chip:hover{color:var(--ink)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cat-block{margin-top:46px}
.cat-block .cat-title{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.cat-block .cat-title .swatch{width:14px;height:14px;border-radius:4px;background:var(--accent)}
.cat-block .cat-title h2{font-size:1.5rem}
.cat-block .cat-title span{font-family:var(--mono);font-size:.78rem;color:var(--muted)}

/* ---------- CASE STUDY ---------- */
.back{font-family:var(--mono);font-size:.82rem;color:var(--muted);display:inline-flex;gap:8px;align-items:center;margin:30px 0 22px}
.back:hover{color:var(--ink)}
.case-hero{max-width:860px}
.case-hero h1{font-size:clamp(2rem,4.6vw,3.4rem);font-weight:800;margin:10px 0 14px}
.case-hero .tag{font-size:1.15rem;color:var(--muted);margin:0 0 22px}
.meta-row{display:flex;flex-wrap:wrap;gap:10px 28px;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:8px}
.meta-row .mi b{font-family:var(--mono);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent-deep);display:block;font-weight:500}
.meta-row .mi span{font-size:.96rem}
.heroimg{margin:30px 0 8px;border-radius:22px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:#fff}
.heroimg img{width:100%;max-height:560px;object-fit:cover}
.heroimg.contain img{object-fit:contain;padding:22px;max-height:520px}
.heroimg.wide img{object-fit:contain;background:#0b0b0b;max-height:none}

.cs{max-width:860px;margin:0 auto}
.block{padding:40px 0;border-top:1px solid var(--line)}
.block:first-child{border-top:none}
.block > .eyebrow{display:block;margin-bottom:14px}
.lead-p{font-size:1.25rem;line-height:1.5;color:var(--ink);max-width:62ch}

/* process steps */
.psteps{display:flex;flex-direction:column;gap:34px}
.pstep{display:grid;grid-template-columns:54px 1fr;gap:20px}
@media(max-width:560px){.pstep{grid-template-columns:1fr}}
.pstep .pn{font-family:var(--mono);font-size:.85rem;color:var(--accent-deep);border:1px solid color-mix(in srgb,var(--accent) 30%,var(--line));
  border-radius:12px;height:48px;width:48px;display:flex;align-items:center;justify-content:center;background:var(--soft)}
.pstep h4{font-family:var(--display);font-weight:700;font-size:1.3rem;margin:6px 0 10px}
.pstep ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:8px}
.pstep li{position:relative;padding-left:22px;color:var(--ink)}
.pstep li::before{content:"";position:absolute;left:2px;top:.62em;width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* figures */
figure{margin:24px 0 0}
figure.fig .media{border-radius:18px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:#fff}
figure.fig .media img{width:100%}
figure.fig.contain .media{max-width:720px;margin:0 auto}
figure.fig.contain .media img{padding:18px}
figcaption{font-family:var(--mono);font-size:.78rem;line-height:1.5;color:var(--muted);margin-top:12px;max-width:70ch}
.figgrid{display:grid;gap:18px;margin-top:24px}
.figgrid.g2{grid-template-columns:1fr 1fr}.figgrid.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:680px){.figgrid.g2,.figgrid.g3{grid-template-columns:1fr}}
.figgrid figure{margin:0}
.figgrid .media{border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:#fff}
.figgrid.contain .media img{padding:14px}
video{width:100%;display:block;border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow);background:#000}

/* metrics chips */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:760px){.metrics{grid-template-columns:1fr 1fr}}
.metric{background:var(--soft);border:1px solid color-mix(in srgb,var(--accent) 20%,var(--line));border-left:4px solid var(--accent);
  border-radius:14px;padding:20px 18px}
.metric .v{font-family:var(--display);font-weight:800;font-size:clamp(1.5rem,3vw,2.1rem);color:var(--accent-deep);line-height:1;letter-spacing:-.02em}
.metric .l{font-family:var(--mono);font-size:.74rem;line-height:1.45;color:var(--muted);margin-top:10px;text-transform:none}

/* findings cards */
.findings{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.findings{grid-template-columns:1fr}}
.finding{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 20px}
.finding .v{font-family:var(--display);font-weight:800;font-size:1.7rem;color:var(--accent-deep);letter-spacing:-.02em}
.finding .l{color:var(--ink);font-size:.96rem;margin-top:8px}

/* recommendation cards */
.recs{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.recs{grid-template-columns:1fr}}
.rec{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 20px;position:relative;overflow:hidden}
.rec::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
.rec h4{font-family:var(--display);font-weight:700;font-size:1.08rem;margin:0 0 6px}
.rec p{font-size:.94rem;color:var(--muted);margin:0}

/* framework flow */
.fw{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
.fw .fwc{flex:1;min-width:200px;background:var(--soft);border:1px solid color-mix(in srgb,var(--accent) 24%,var(--line));
  border-radius:14px;padding:18px 16px;font-family:var(--display);font-weight:600;font-size:1rem;color:var(--accent-deep);display:flex;align-items:center}
.fw .fwa{display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.4rem;padding:0 10px}
@media(max-width:680px){.fw{flex-direction:column}.fw .fwa{transform:rotate(90deg);padding:8px 0}}

/* skills */
.skillwrap{display:flex;flex-wrap:wrap;gap:9px}

/* case footer nav */
.casefoot{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center;margin-top:10px}

/* ---------- CV ---------- */
.cv-top{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;padding:64px 0 30px}
.cv-top h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:800}
.cv-top .contact{font-family:var(--mono);font-size:.84rem;color:var(--muted);margin-top:12px;display:flex;flex-wrap:wrap;gap:6px 18px}
.cv-top .contact a:hover{color:var(--ink)}
.cv-sec{padding:34px 0;border-top:1px solid var(--line)}
.cv-sec > h2{font-family:var(--display);font-size:1.4rem;margin-bottom:22px}
.cv-item{display:grid;grid-template-columns:200px 1fr;gap:22px;margin-bottom:26px}
@media(max-width:680px){.cv-item{grid-template-columns:1fr;gap:6px}}
.cv-item .when{font-family:var(--mono);font-size:.8rem;color:var(--muted);padding-top:3px}
.cv-item h3{font-family:var(--display);font-weight:700;font-size:1.12rem}
.cv-item .role{color:var(--accent-deep);font-weight:600;font-size:.96rem;margin-top:2px}
.cv-item .loc{color:var(--muted);font-size:.86rem;font-family:var(--mono)}
.cv-item ul{margin:10px 0 0;padding-left:18px;color:var(--ink)}
.cv-item ul li{margin-bottom:6px;font-size:.96rem}
.cv-item .deg{font-size:.98rem;margin-top:4px}
.skillgroup{margin-bottom:18px}
.skillgroup .g{font-family:var(--mono);font-size:.74rem;text-transform:uppercase;letter-spacing:.1em;color:var(--accent-deep);margin-bottom:9px}

/* ---------- CONTACT ---------- */
.contact-hero{padding:90px 0 40px;max-width:760px}
.contact-hero h1{font-size:clamp(2.4rem,5.5vw,4rem);font-weight:800}
.contact-hero p{font-size:1.15rem;color:var(--muted);margin-top:18px}
.contact-rows{margin-top:36px;border-top:1px solid var(--line)}
.crow{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 0;border-bottom:1px solid var(--line)}
.crow .k{font-family:var(--mono);font-size:.76rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.crow .v{font-family:var(--display);font-weight:600;font-size:clamp(1.1rem,2.4vw,1.5rem)}
.crow a:hover .v{color:var(--accent-deep)}

/* ---------- FOOTER ---------- */
footer.site{margin-top:40px;border-top:1px solid var(--line);background:var(--surface)}
.foot-in{max-width:var(--maxw);margin:0 auto;padding:40px 24px;display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;align-items:flex-start}
.foot-in .fb{font-family:var(--display);font-weight:700;font-size:1.1rem}
.foot-in .ft{color:var(--muted);font-size:.9rem;margin-top:8px;max-width:34ch}
.foot-links{display:flex;gap:26px;flex-wrap:wrap;font-size:.92rem}
.foot-links a{color:var(--muted)}.foot-links a:hover{color:var(--ink)}
.foot-copy{font-family:var(--mono);font-size:.74rem;color:var(--muted);border-top:1px solid var(--line);padding:16px 24px;max-width:var(--maxw);margin:0 auto}
</style>
</head>
<body>
<header class="nav">
  <div class="nav-in">
    <a class="brand" href="#/" aria-label="Elva Wang — home">
      <span class="dots"><i></i><i></i><i></i></span> Elva Wang
    </a>
    <button class="menu-btn" id="menuBtn" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="nav-links" id="navLinks">
      <a href="#/" data-route="">About</a>
      <a href="#/cv" data-route="cv">CV</a>
      <a href="#/projects" data-route="projects">Projects</a>
      <a href="#/contact" data-route="contact">Contact</a>
    </nav>
  </div>
</header>

<main id="app"></main>

<footer class="site">
  <div class="foot-in">
    <div>
      <div class="fb">Elva Wang</div>
      <div class="ft">Learning design, research-driven strategy, and data-informed products.</div>
    </div>
    <div class="foot-links">
      <a href="#/">About</a><a href="#/projects">Projects</a><a href="#/cv">CV</a>
      <a href="#/contact">Contact</a><a id="footMail">Email</a>
    </div>
  </div>
  <div class="foot-copy" id="footCopy"></div>
</footer>

<script src="data.js"></script>
<script>
(function(){
  const S = window.SITE, app = document.getElementById('app');
  const CATS = S.categories;
  const byCat = k => S.projects.filter(p=>p.cat===k);
  const find = id => S.projects.find(p=>p.id===id);
  const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  /* ---- reusable bits ---- */
  function card(p){
    if(p.status){ // upcoming / non-clickable
      return `<div class="card soon cat-${p.cat}">
        <div class="thumb"><span class="badge">${esc(p.status)}</span></div>
        <div class="card-body">
          <span class="cat">${esc(CATS[p.cat].name)}</span>
          <h3>${esc(p.title)}</h3>
          <p class="desc">${esc(p.card.desc)}</p>
          <div class="pills">${p.card.methods.map(m=>`<span class="pill">${esc(m)}</span>`).join('')}</div>
          <span class="view">Coming soon</span>
        </div></div>`;
    }
    const tc = p.card.thumbContain ? ' contain':'';
    return `<a class="card cat-${p.cat}" href="#/case/${p.id}">
      <div class="thumb${tc}"><img loading="lazy" src="${p.card.thumb}" alt="${esc(p.title)}"></div>
      <div class="card-body">
        <span class="cat">${esc(CATS[p.cat].name)}</span>
        <h3>${esc(p.title)}</h3>
        <p class="desc">${esc(p.card.desc)}</p>
        <div class="pills">${p.card.methods.map(m=>`<span class="pill">${esc(m)}</span>`).join('')}</div>
        <span class="view">View case study <span class="arr">→</span></span>
      </div></a>`;
  }

  function figure(f){
    const cls = (f.contain?' contain':'');
    return `<figure class="fig${cls}"><div class="media"><img loading="lazy" src="${f.src}" alt="${esc(f.cap||'')}"></div>${f.cap?`<figcaption>${esc(f.cap)}</figcaption>`:''}</figure>`;
  }
  function figsBlock(figs){
    if(!figs||!figs.length) return '';
    const grid = figs.length>1 && figs.every(f=>f.grid);
    if(grid){
      const g = figs.length>=3?'g3':'g2';
      const contain = figs.every(f=>f.contain)?' contain':'';
      return `<div class="figgrid ${g}${contain}">${figs.map(f=>`<figure><div class="media"><img loading="lazy" src="${f.src}" alt="${esc(f.cap||'')}"></div>${f.cap?`<figcaption>${esc(f.cap)}</figcaption>`:''}</figure>`).join('')}</div>`;
    }
    return figs.map(figure).join('');
  }

  function renderBlock(b){
    switch(b.t){
      case 'framework':
        return `<section class="block"><span class="eyebrow">${esc(b.title||'Framework')}</span>
          <div class="fw">${b.steps.map((s,i)=>`<div class="fwc">${esc(s)}</div>${i<b.steps.length-1?'<div class="fwa">→</div>':''}`).join('')}</div></section>`;
      case 'process':
        return `<section class="block"><span class="eyebrow">Process</span>
          <div class="psteps">${b.items.map((it,i)=>`
            <div class="pstep">
              <div class="pn">${String(i+1).padStart(2,'0')}</div>
              <div>
                <h4>${esc(it.label)}</h4>
                <ul>${it.points.map(pt=>`<li>${esc(pt)}</li>`).join('')}</ul>
                ${figsBlock(it.figs)}
              </div>
            </div>`).join('')}</div></section>`;
      case 'figure':
        return `<section class="block">${figure(b)}</section>`;
      case 'gallery':{
        const g = b.items.length>=3?'g3':'g2';
        const contain = b.items.every(f=>f.contain)?' contain':'';
        return `<section class="block">${b.title?`<span class="eyebrow">${esc(b.title)}</span>`:''}
          <div class="figgrid ${g}${contain}">${b.items.map(f=>`<figure><div class="media"><img loading="lazy" src="${f.src}" alt="${esc(f.cap||'')}"></div>${f.cap?`<figcaption>${esc(f.cap)}</figcaption>`:''}</figure>`).join('')}</div></section>`;
      }
      case 'video':
        return `<section class="block"><figure class="fig"><video controls preload="none" src="${b.src}"></video>${b.cap?`<figcaption>${esc(b.cap)}</figcaption>`:''}</figure></section>`;
      case 'metrics':
        return `<section class="block"><span class="eyebrow">By the numbers</span>
          <div class="metrics">${b.items.map(m=>`<div class="metric"><div class="v">${esc(m.v)}</div><div class="l">${esc(m.l)}</div></div>`).join('')}</div></section>`;
      case 'findings':
        return `<section class="block"><span class="eyebrow">${esc(b.title||'Key findings')}</span>
          <div class="findings">${b.items.map(f=>`<div class="finding"><div class="v">${esc(f.v)}</div><div class="l">${esc(f.l)}</div></div>`).join('')}</div></section>`;
      case 'recs':
        return `<section class="block"><span class="eyebrow">${esc(b.title||'Recommendations')}</span>
          <div class="recs">${b.items.map(r=>`<div class="rec"><h4>${esc(r.h)}</h4><p>${esc(r.p)}</p></div>`).join('')}</div></section>`;
      default: return '';
    }
  }

  /* ---- VIEWS ---- */
  function viewHome(){
    const tiles = Object.values(CATS).map((c,i)=>{
      const n = byCat(c.key).length;
      return `<a class="tile cat-${c.key}" href="#/projects/${c.key}">
        <span class="num">0${i+1} · ${n} project${n>1?'s':''}</span>
        <h3>${esc(c.name)}</h3><p>${esc(c.blurb)}</p>
        <span class="go">Explore <span class="arr">→</span></span></a>`;
    }).join('');

    const feat = S.featured.map(id=>find(id)).filter(Boolean).map(card).join('');

    const flow = S.process.map((s,i)=>`<div class="step"><span class="n">${i+1}</span><h4>${esc(s.label)}</h4><p>${esc(s.text)}</p></div>`).join('');

    return `<div class="view"><div class="wrap">
      <section class="hero">
        <h1>I design <span class="m">learning experiences</span>, <span class="c">research-driven strategies</span>, and <span class="d">data-informed products</span>.</h1>
        <p class="lede">${esc(S.profile.summary)}</p>
        <div class="hero-meta">
          <span class="tagpill">Learning Design</span>
          <span class="tagpill">Product Strategy</span>
          <span class="tagpill">Evaluation & Data</span>
          <span class="tagpill">M.Ed. Harvard · 2026</span>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-head"><div><span class="eyebrow">Three ways I work</span><h2>Pick a practice area</h2></div>
        <p>Each area links to the projects behind it — color-coded throughout the site.</p></div>
        <div class="tiles">${tiles}</div>
      </section>

      <section class="section reveal">
        <div class="section-head"><div><span class="eyebrow">Featured work</span><h2>Selected projects</h2></div>
        <p>A scrollable preview — open any card for the full case study.</p></div>
        <div class="scroller">${feat}</div>
      </section>

      <section class="section reveal">
        <div class="section-head"><div><span class="eyebrow">How I work</span><h2>From research to evaluation</h2></div>
        <p>One sequence I run across learning, strategy, and data projects.</p></div>
        <div class="flow">${flow}</div>
      </section>

      <section class="section reveal">
        <div class="cta">
          <div><h2>Let's build something measurable.</h2><p>Open to learning design, product strategy, and research roles.</p></div>
          <div style="display:flex;gap:12px;flex-wrap:wrap">
            <a class="btn" href="mailto:${S.profile.email}">Email me</a>
            <a class="btn ghost" href="#/projects">See all projects</a>
          </div>
        </div>
      </section>
    </div></div>`;
  }

  function viewProjects(filter){
    const valid = CATS[filter] ? filter : 'all';
    const chips = [['all','All work'],...Object.values(CATS).map(c=>[c.key,c.name])]
      .map(([k,label])=>`<a class="chip ${valid===k?'on':''}" href="#/projects${k==='all'?'':'/'+k}">${esc(label)}</a>`).join('');

    const blocks = Object.values(CATS).filter(c=>valid==='all'||valid===c.key).map(c=>{
      const ps = byCat(c.key);
      return `<div class="cat-block cat-${c.key}">
        <div class="cat-title"><span class="swatch"></span><h2>${esc(c.name)}</h2><span>${ps.length} project${ps.length>1?'s':''}</span></div>
        <div class="cards">${ps.map(card).join('')}</div></div>`;
    }).join('');

    return `<div class="view"><div class="wrap">
      <section class="hero" style="padding:64px 0 8px">
        <span class="eyebrow">Projects</span>
        <h1 style="font-size:clamp(2.2rem,5vw,3.6rem);max-width:18ch;margin-top:10px">Case studies across learning, strategy, and data.</h1>
      </section>
      <div class="filters">${chips}</div>
      ${blocks}
      <div style="height:40px"></div>
    </div></div>`;
  }

  function viewCase(id){
    const p = find(id);
    if(!p || p.status) return viewProjects('all');
    const hero = p.hero ? `<div class="heroimg${p.hero.contain?' contain':''}${p.hero.wide?' wide':''}"><img src="${p.hero.img}" alt="${esc(p.title)}"></div>` : '';
    const meta = [['Role',p.role],['Organization',p.org],['Timeline',p.period]]
      .filter(m=>m[1]).map(m=>`<div class="mi"><b>${m[0]}</b><span>${esc(m[1])}</span></div>`).join('');
    const aud = p.audience ? `<div class="pills" style="margin-top:18px">${p.audience.map(a=>`<span class="pill">${esc(a)}</span>`).join('')}</div>` : '';
    const body = (p.body||[]).map(renderBlock).join('');
    const related = byCat(p.cat).filter(x=>x.id!==p.id && !x.status);
    const nextP = related[0];

    return `<div class="view cat-${p.cat}"><div class="wrap">
      <a class="back" href="#/projects/${p.cat}">← ${esc(CATS[p.cat].name)}</a>
      <header class="case-hero">
        <span class="eyebrow">${esc(CATS[p.cat].name)}</span>
        <h1>${esc(p.title)}</h1>
        <p class="tag">${esc(p.tag)}</p>
      </header>
      ${hero}
      <div class="cs">
        <div class="meta-row">${meta}</div>
        ${aud}
        <section class="block"><span class="eyebrow">${esc(p.problemLabel||'Problem / Goal')}</span>
          <p class="lead-p">${esc(p.problem)}</p></section>
        ${body}
        <section class="block"><span class="eyebrow">Skills & tools</span>
          <div class="skillwrap">${p.skills.map(s=>`<span class="pill">${esc(s)}</span>`).join('')}</div></section>
        <section class="block casefoot">
          <a class="btn solid-ink" href="#/projects/${p.cat}">← All ${esc(CATS[p.cat].name)}</a>
          ${nextP?`<a class="btn" href="#/case/${nextP.id}">Next: ${esc(nextP.title.split('—')[0].trim())} →</a>`:''}
        </section>
      </div>
      <div style="height:30px"></div>
    </div></div>`;
  }

  function viewCV(){
    const cv = S.cv;
    const eduItem = e=>`<div class="cv-item"><div class="when">${esc(e.date)}</div>
      <div><h3>${esc(e.school)}</h3><div class="loc">${esc(e.loc)}</div><div class="deg">${esc(e.deg)}</div>
      <ul>${e.notes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul></div></div>`;
    const expItem = x=>`<div class="cv-item"><div class="when">${esc(x.date)}</div>
      <div><h3>${esc(x.org)}</h3><div class="role">${esc(x.role)}</div><div class="loc">${esc(x.loc||'')}</div>
      <ul>${x.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div></div>`;
    const projItem = x=>`<div class="cv-item"><div class="when">${esc(x.date)}</div>
      <div><h3>${esc(x.org)}</h3><div class="role">${esc(x.role)}</div>
      <ul>${x.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div></div>`;
    const skillItem = g=>`<div class="skillgroup"><div class="g">${esc(g.group)}</div>
      <div class="skillwrap">${g.items.map(i=>`<span class="pill">${esc(i)}</span>`).join('')}</div></div>`;

    return `<div class="view"><div class="wrap">
      <section class="cv-top">
        <div>
          <span class="eyebrow">Curriculum Vitae</span>
          <h1>${esc(S.profile.name)}</h1>
          <div class="contact">
            <a href="mailto:${S.profile.email}">${esc(S.profile.email)}</a>
            <span>${esc(S.profile.phone)}</span>
            <a href="${S.profile.linkedin}" target="_blank" rel="noopener">LinkedIn</a>
          </div>
        </div>
        <a class="btn" href="${S.profile.resume}" download>↓ Download résumé</a>
      </section>
      <section class="cv-sec"><h2>Education</h2>${cv.education.map(eduItem).join('')}</section>
      <section class="cv-sec"><h2>Experience</h2>${cv.experience.map(expItem).join('')}</section>
      <section class="cv-sec"><h2>Selected projects</h2>${cv.projects.map(projItem).join('')}</section>
      <section class="cv-sec"><h2>Skills</h2>${cv.skills.map(skillItem).join('')}
        <div class="skillgroup"><div class="g">Certification</div><div class="skillwrap"><span class="pill">${esc(cv.cert)}</span></div></div>
      </section>
      <div style="height:30px"></div>
    </div></div>`;
  }

  function viewContact(){
    return `<div class="view"><div class="wrap">
      <section class="contact-hero">
        <span class="eyebrow">Contact</span>
        <h1>Let's talk.</h1>
        <p>I'm open to roles and collaborations in learning design, product strategy, and research. The fastest way to reach me is email.</p>
        <div class="contact-rows">
          <a class="crow" href="mailto:${S.profile.email}"><span class="k">Email</span><span class="v">${esc(S.profile.email)}</span></a>
          <a class="crow" href="tel:${S.profile.phone.replace(/[^0-9+]/g,'')}"><span class="k">Phone</span><span class="v">${esc(S.profile.phone)}</span></a>
          <a class="crow" href="${S.profile.linkedin}" target="_blank" rel="noopener"><span class="k">LinkedIn</span><span class="v">View profile →</span></a>
          <a class="crow" href="${S.profile.resume}" download><span class="k">Résumé</span><span class="v">Download →</span></a>
        </div>
      </section>
      <div style="height:50px"></div>
    </div></div>`;
  }

  /* ---- router ---- */
  function parse(){
    const h = location.hash.replace(/^#\/?/,'');
    const parts = h.split('/').filter(Boolean);
    return {root:parts[0]||'', a:parts[1]||''};
  }
  function setActive(root){
    document.querySelectorAll('.nav-links a').forEach(a=>{
      const r = a.getAttribute('data-route');
      const on = (r==='') ? (root==='') : (root===r || (root==='case'&&r==='projects'));
      a.classList.toggle('active', on);
    });
  }
  function render(){
    const {root,a} = parse();
    let html;
    if(root==='') html=viewHome();
    else if(root==='projects') html=viewProjects(a);
    else if(root==='case') html=viewCase(a);
    else if(root==='cv') html=viewCV();
    else if(root==='contact') html=viewContact();
    else html=viewHome();
    app.innerHTML = html;
    setActive(root);
    document.getElementById('navLinks').classList.remove('open');
    document.getElementById('menuBtn').setAttribute('aria-expanded','false');
    window.scrollTo({top:0,behavior:'auto'});
    observeReveals();
  }

  /* scroll reveal */
  let io;
  function observeReveals(){
    if(!('IntersectionObserver' in window)) return;
    if(io) io.disconnect();
    io = new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.12});
    document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  }

  document.getElementById('menuBtn').addEventListener('click',function(){
    const n=document.getElementById('navLinks'); const open=n.classList.toggle('open');
    this.setAttribute('aria-expanded',open?'true':'false');
  });
  document.getElementById('footMail').setAttribute('href','mailto:'+S.profile.email);
  document.getElementById('footCopy').textContent='© '+new Date().getFullYear()+' Elva Wang · Built as a portfolio site.';

  window.addEventListener('hashchange',render);
  render();
})();
</script>
</body>
</html>
